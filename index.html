<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toco.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f8f6;
      color: #1a1a18;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 0.5px solid #d3d1c7;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }

    .count {
      font-size: 12px;
      color: #888780;
      background: #f1efe8;
      padding: 3px 10px;
      border-radius: 20px;
    }

    main {
      flex: 1;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1rem 6rem;
    }

    /* Input */
    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 0.5rem 0.5rem 0.5rem 1rem;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      background: transparent;
      color: #1a1a18;
    }

    .input-area input::placeholder { color: #b0ada4; }

    .btn-add {
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-add:active { background: #3c3c38; }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .filter-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 0.5px solid #d3d1c7;
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #1a1a18;
      color: #fff;
      border-color: #1a1a18;
    }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 0.875rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: opacity 0.2s;
    }

    .task-item.done { opacity: 0.5; }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #d3d1c7;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all 0.15s;
    }

    .task-item.done .check-btn {
      background: #1a1a18;
      border-color: #1a1a18;
      color: #fff;
    }

    .task-title {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: #888780;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #b0ada4;
      cursor: pointer;
      font-size: 18px;
      padding: 2px 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:active { color: #e05252; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #888780;
    }

    .empty p { font-size: 14px; margin-top: 0.5rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a18;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      transition: transform 0.25s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <span class="logo">toco.</span>
    <span class="count" id="count">0件</span>
  </header>

  <main>
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="タスクを入力..." maxlength="200">
      <button class="btn-add" onclick="addTask()">追加</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('active', this)">未完了</button>
      <button class="filter-btn" onclick="setFilter('done', this)">完了済み</button>
    </div>

    <div class="task-list" id="taskList"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('toco_tasks') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('toco_tasks', JSON.stringify(tasks));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function updateCount() {
      const active = tasks.filter(t => !t.done).length;
      document.getElementById('count').textContent =
        active > 0 ? `未完了 ${active}件` : `${tasks.length}件`;
    }

    function render() {
      const list = document.getElementById('taskList');
      const filtered = tasks.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">
          <div style="font-size:32px">${filter === 'done' ? '✅' : '📋'}</div>
          <p>${filter === 'done' ? '完了済みのタスクはありません' : 'タスクを追加してみましょう'}</p>
        </div>`;
        updateCount();
        return;
      }

      list.innerHTML = filtered.map(task => `
        <div class="task-item ${task.done ? 'done' : ''}" id="task-${task.id}">
          <button class="check-btn" onclick="toggleTask(${task.id})">${task.done ? '✓' : ''}</button>
          <span class="task-title">${escapeHtml(task.title)}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})">×</button>
        </div>
      `).join('');

      updateCount();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) { showToast('タイトルを入力してください'); return; }
      const id = Date.now();
      tasks.unshift({ id, title, done: false });
      save();
      render();
      input.value = '';
      showToast('追加しました');
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.done = !task.done;
      save();
      render();
      showToast(task.done ? '完了しました ✓' : '未完了に戻しました');
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
      showToast('削除しました');
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
